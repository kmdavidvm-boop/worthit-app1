<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorthIt Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 400px; height: 100vh; background: white; position: relative; overflow-y: auto; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; }
        .total-box { background: var(--blue); color: white; margin: 10px 20px; padding: 20px; border-radius: 20px; font-size: 28px; font-weight: bold; }
        .item-card { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin: 10px 20px; display: flex; flex-direction: column; }
        .editable { border: none; background: #f9f9f9; padding: 5px; width: 100%; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--blue); color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000; }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 400px; height: 60px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-home">
        <div class="header"><h1>🍎 WorthIt</h1></div>
        <div class="total-box" id="total-val">€0</div>
        <h3>Recently Valued</h3>
        <div id="history-container"></div>
    </div>

    <div id="screen-progress" class="hidden">
        <div class="header"><h2>📊 Progreso</h2></div>
        <div style="padding: 20px;"><canvas id="myChart"></canvas></div>
    </div>

    <div class="nav">
        <button onclick="nav('home')">🏠 Home</button>
        <button onclick="nav('progress')">📈 Progress</button>
    </div>

    <button class="fab" onclick="document.getElementById('file-input').click()">+</button>
    <input type="file" id="file-input" class="hidden" onchange="processImage(event)">
</div>

<script>
    let total = 0;
    let items = [];

    function nav(s) {
        document.getElementById('screen-home').classList.toggle('hidden', s !== 'home');
        document.getElementById('screen-progress').classList.toggle('hidden', s !== 'progress');
    }

    function processImage(e) {
        // Simulamos la IA (aquí conectarías con Gemini en un futuro)
        const name = "Objeto Detectado";
        const price = Math.floor(Math.random() * 500) + 50;
        
        items.push({ name, price, desc: "Sin descripción" });
        total += price;
        render();
    }

    function render() {
        document.getElementById('total-val').innerText = '€' + total;
        const container = document.getElementById('history-container');
        container.innerHTML = '';
        items.forEach((item, index) => {
            container.innerHTML += `
                <div class="item-card">
                    <input class="editable" value="${item.name}" onchange="items[${index}].name=this.value">
                    <input class="editable" value="${item.desc}" onchange="items[${index}].desc=this.value">
                    <b style="color:var(--blue)">€${item.price}</b>
                </div>`;
        });
    }

    // Gráfico
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, { type: 'line', data: { labels: ['Ene', 'Feb'], datasets: [{ data: [0, total], borderColor: '#007AFF' }] } });
</script>

</body>
</html>
