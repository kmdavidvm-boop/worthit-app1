<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorthIt</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #app { width: 100%; max-width: 400px; height: 90vh; background: white; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .screen { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .active { display: block; }
        .total-box { background: #007AFF; color: white; padding: 20px; border-radius: 20px; text-align: center; font-size: 28px; font-weight: bold; margin: 10px; }
        .card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin: 10px 20px; border: 1px solid #eee; }
        .nav { height: 60px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .fab { position: absolute; bottom: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #007AFF; color: white; border: none; font-size: 30px; box-shadow: 0 5px 15px rgba(0,122,255,0.4); }
    </style>
</head>
<body>
<div id="app">
    <div id="home" class="screen active">
        <h2>🍎 WorthIt</h2>
        <div class="total-box" id="total">€1,235</div>
        <h3>Recently Valued</h3>
        <div id="history"></div>
    </div>
    <div id="progress" class="screen">
        <h2>📈 Tu Progreso</h2>
        <canvas id="myChart"></canvas>
    </div>
    <div class="nav">
        <button onclick="show('home')">🏠 Home</button>
        <button onclick="show('progress')">📈 Progress</button>
    </div>
    <button class="fab" onclick="document.getElementById('input-file').click()">+</button>
    <input type="file" id="input-file" style="display:none" onchange="add()">
</div>
<script>
    let total = 1235;
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function add() {
        // Simulamos IA
        let price = Math.floor(Math.random() * 500) + 50;
        total += price;
        document.getElementById('total').innerText = '€' + total;
        let div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `Objeto nuevo - <b>€${price}</b>`;
        document.getElementById('history').appendChild(div);
    }
</script>
</body>
</html>
